<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack Trainer</title>
    <script>
      (function () {
        // Sets the theme before first paint so there's no light-mode flash for dark-preferring
        // users. Mirrors src/persistence/preferences.ts's storage key and fallback order — keep
        // both in sync if either changes.
        var STORAGE_KEY = "blackjack-trainer:preferences";
        var theme = "light";
        try {
          var stored = JSON.parse(window.localStorage.getItem(STORAGE_KEY));
          if (stored && (stored.theme === "light" || stored.theme === "dark")) {
            theme = stored.theme;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch (e) {
          // Malformed storage: keep the light default.
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
